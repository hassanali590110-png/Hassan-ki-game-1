<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#58a6ff">
  <meta name="description" content="Play Virat Kohli Pong Game">
  <title>Virat Kohli Pong Game</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icons/icon-192.svg">
  <style>
    :root {
      color-scheme: dark;
      --bg: #07111f;
      --surface: rgba(15, 23, 42, 0.96);
      --text: #f4f7ff;
      --accent: #58a6ff;
      --accent-light: #87ceeb;
      --muted: #94a3b8;
      --border: rgba(255,255,255,0.08);
      --success: #4ade80;
      --danger: #cbd81700;
      font-family: 'Segoe UI', Inter, system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 20% 50%, rgba(88,166,255,0.25), transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(108, 72, 255, 0.2), transparent 50%),
                  linear-gradient(135deg, #03060f 0%, #0f1729 50%, #1a1f3a 100%);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: min(980px, 100%);
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.98), rgba(30, 41, 75, 0.95));
      border: 1px solid rgba(88,166,255,0.2);
      border-radius: 28px;
      box-shadow: 0 0 60px rgba(88,166,255,0.15),
                  0 28px 88px rgba(0,0,0,0.45),
                  inset 0 1px 0 rgba(255,255,255,0.1);
      overflow: hidden;
      padding: 24px;
      backdrop-filter: blur(10px);
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .top-bar h1 {
      margin: 0;
      font-size: clamp(1.8rem, 2.2vw, 2.6rem);
      background: linear-gradient(135deg, var(--accent-light), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .top-bar a, .top-bar button {
      color: var(--text);
      text-decoration: none;
      font-size: 0.95rem;
      border: 1px solid rgba(88,166,255,0.3);
      padding: 10px 16px;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(88,166,255,0.12), rgba(108, 72, 255, 0.08));
      transition: all 300ms ease;
      font-weight: 500;
      cursor: pointer;
    }

    .top-bar a:hover, .top-bar button:hover {
      background: linear-gradient(135deg, rgba(88,166,255,0.25), rgba(108, 72, 255, 0.15));
      border-color: rgba(88,166,255,0.5);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(88,166,255,0.2);
    }

    .board {
      position: relative;
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      background: linear-gradient(135deg, #1a2942, #2a3d5c);
      border: 2px solid rgba(88,166,255,0.3);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(88,166,255,0.1),
                  inset 0 0 20px rgba(0,0,0,0.3);
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      background: linear-gradient(135deg, #0d1b2a 0%, #1a2a42 100%);
    }

    .controls {
      display: grid;
      gap: 14px;
      margin-top: 18px;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    }

    .button {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      border: 1.5px solid rgba(88,166,255,0.2);
      background: linear-gradient(135deg, rgba(88,166,255,0.08), rgba(108, 72, 255, 0.05));
      color: var(--text);
      border-radius: 16px;
      padding: 14px 18px;
      cursor: pointer;
      transition: all 300ms cubic-bezier(0.34, 1.56, 0.64, 1);
      user-select: none;
      font-weight: 600;
      position: relative;
      overflow: hidden;
    }

    .button:hover {
      background: linear-gradient(135deg, rgba(88,166,255,0.2), rgba(108, 72, 255, 0.12));
      border-color: rgba(88,166,255,0.5);
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(88,166,255,0.25);
    }

    .stats {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      margin-top: 24px;
    }

    .stat-card {
      padding: 24px 18px;
      background: linear-gradient(135deg, rgba(88,166,255,0.05), rgba(108, 72, 255, 0.03));
      border: 1.5px solid rgba(88,166,255,0.15);
      border-radius: 20px;
      text-align: center;
      transition: all 300ms ease;
      position: relative;
      overflow: hidden;
    }

    .stat-card strong {
      display: block;
      font-size: 2.4rem;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--accent-light), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 700;
    }

    .stat-card span {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .help {
      margin-top: 24px;
      padding: 18px 20px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.7;
      background: linear-gradient(135deg, rgba(88,166,255,0.05), rgba(108, 72, 255, 0.03));
      border-left: 3px solid var(--accent);
      border-radius: 8px;
      letter-spacing: 0.3px;
    }

    .help strong {
      color: var(--accent-light);
      font-weight: 600;
    }

    @media (max-width: 640px) {
      .top-bar { text-align: center; }
      .top-bar h1 { width: 100%; }
      .controls { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <h1>virat kohli game</h1>
      <div style="display:flex;gap:8px;align-items:center;">
        <a href="login.html">Back to Login</a>
        <a href="index.html">Back to Gallery</a>
      </div>
    </div>

    <div class="board">
      <canvas id="gameCanvas" width="880" height="520"></canvas>
    </div>

    <div class="controls">
      <div class="button" id="startBtn">Start Game</div>
      <div class="button" id="pauseBtn">Pause</div>
      <div class="button" id="resetBtn">Reset</div>
      <div class="button" id="toggleSoundBtn">Sound On</div>
      <div class="button" id="difficultyBtn">Difficulty: Normal</div>
      <div class="button" id="fullscreenBtn">Fullscreen</div>
    </div>

    <div class="stats">
      <div class="stat-card">
        <strong id="scoreLeft">0</strong>
        <span>You</span>
      </div>
      <div class="stat-card">
        <strong id="scoreRight">0</strong>
        <span>Computer</span>
      </div>
      <div class="stat-card">
        <strong id="difficultyLevel">Normal</strong>
        <span>Difficulty</span>
      </div>
      <div class="stat-card">
        <strong id="soundStatus">On</strong>
        <span>Sound</span>
      </div>
      <div class="stat-card">
        <strong id="gameState">Stopped</strong>
        <span>Status</span>
      </div>
    </div>

    <div class="help">
      Use <strong>W</strong> / <strong>S</strong> or <strong>Up</strong> / <strong>Down</strong> to move your paddle. Press <strong>M</strong> to mute/unmute, <strong>D</strong> to cycle difficulty, and <strong>F</strong> to toggle fullscreen.
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const resetBtn = document.getElementById('resetBtn');
    const scoreLeftEl = document.getElementById('scoreLeft');
    const scoreRightEl = document.getElementById('scoreRight');
    const gameStateEl = document.getElementById('gameState');
    const toggleSoundBtn = document.getElementById('toggleSoundBtn');
    const difficultyBtn = document.getElementById('difficultyBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');

    const paddleWidth = 14;
    const paddleHeight = 110;
    const ballRadius = 10;
    const keys = { ArrowUp: false, ArrowDown: false, w: false, s: false };

    const state = {
      left: { x: 24, y: canvas.height / 2 - paddleHeight / 2 },
      right: { x: canvas.width - 24 - paddleWidth, y: canvas.height / 2 - paddleHeight / 2 },
      ball: { x: canvas.width / 2, y: canvas.height / 2, vx: 240, vy: 180 },
      ballTrail: [],
      scoreLeft: 0,
      scoreRight: 0,
      running: false,
      paused: false,
      soundOn: true,
      difficulty: localStorage.getItem('gallery_user_level') || 'Normal',
      lastFrameTime: 0
    };

    function resetGame() {
      state.left.y = canvas.height / 2 - paddleHeight / 2;
      state.right.y = canvas.height / 2 - paddleHeight / 2;
      state.ball.x = canvas.width / 2;
      state.ball.y = canvas.height / 2;
      state.ball.vx = Math.random() > 0.5 ? 240 : -240;
      state.ball.vy = (Math.random() * 120 + 140) * (Math.random() > 0.5 ? 1 : -1);
      state.scoreLeft = 0;
      state.scoreRight = 0;
      state.running = false;
      state.paused = false;
      state.ballTrail = [];
      updateStats();
      draw();
    }

    function updateStats() {
      scoreLeftEl.textContent = state.scoreLeft;
      scoreRightEl.textContent = state.scoreRight;
      gameStateEl.textContent = state.running ? (state.paused ? 'Paused' : 'Playing') : 'Stopped';
      const difficultyLevelEl = document.getElementById('difficultyLevel');
      const soundStatusEl = document.getElementById('soundStatus');
      if (difficultyLevelEl) difficultyLevelEl.textContent = state.difficulty;
      if (soundStatusEl) soundStatusEl.textContent = state.soundOn ? 'On' : 'Off';
    }

    function drawBoard() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#0b1321';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 2;
      ctx.setLineDash([16, 12]);
      ctx.beginPath();
      ctx.moveTo(canvas.width / 2, 0);
      ctx.lineTo(canvas.width / 2, canvas.height);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.fillStyle = '#58a6ff';
      ctx.shadowColor = 'rgba(88,166,255,0.4)';
      ctx.shadowBlur = 20;
      ctx.fillRect(state.left.x, state.left.y, paddleWidth, paddleHeight);
      ctx.fillRect(state.right.x, state.right.y, paddleWidth, paddleHeight);
      ctx.shadowBlur = 0;

      ctx.fillStyle = 'rgba(88,166,255,0.6)';
      state.ballTrail.forEach((trail, index) => {
        const alpha = Math.max(0.05, 0.25 - index * 0.04);
        ctx.globalAlpha = alpha;
        ctx.beginPath();
        ctx.arc(trail.x, trail.y, ballRadius * 0.8, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;

      ctx.fillStyle = '#58a6ff';
      ctx.beginPath();
      ctx.arc(state.ball.x, state.ball.y, ballRadius, 0, Math.PI * 2);
      ctx.fill();
    }

    function draw() {
      drawBoard();
    }

    function movePaddles(dt) {
      const speed = 420;
      if (keys.ArrowUp || keys.w) state.left.y -= speed * dt;
      if (keys.ArrowDown || keys.s) state.left.y += speed * dt;
      state.left.y = Math.max(0, Math.min(canvas.height - paddleHeight, state.left.y));
    }

    function moveBall(dt) {
      state.ballTrail.unshift({ x: state.ball.x, y: state.ball.y });
      if (state.ballTrail.length > 14) state.ballTrail.pop();

      state.ball.x += state.ball.vx * dt;
      state.ball.y += state.ball.vy * dt;

      if (state.ball.y - ballRadius <= 0 || state.ball.y + ballRadius >= canvas.height) {
        state.ball.vy *= -1;
        playSound(250, 0.05);
      }

      if (state.ball.x - ballRadius <= state.left.x + paddleWidth) {
        if (state.ball.y >= state.left.y && state.ball.y <= state.left.y + paddleHeight) {
          state.ball.vx *= -1.05;
          state.ball.vy += (state.ball.y - (state.left.y + paddleHeight / 2)) * 0.18;
          playSound(400, 0.08);
        }
      }

      if (state.ball.x + ballRadius >= state.right.x) {
        if (state.ball.y >= state.right.y && state.ball.y <= state.right.y + paddleHeight) {
          state.ball.vx *= -1.05;
          state.ball.vy += (state.ball.y - (state.right.y + paddleHeight / 2)) * 0.18;
          playSound(450, 0.08);
        }
      }

      if (state.ball.x - ballRadius < 0) {
        state.scoreRight += 1;
        playSound(180, 0.1);
        resetBall();
      }

      if (state.ball.x + ballRadius > canvas.width) {
        state.scoreLeft += 1;
        playSound(180, 0.1);
        resetBall();
      }
    }

    function resetBall() {
      state.ball.x = canvas.width / 2;
      state.ball.y = canvas.height / 2;
      state.ball.vx = state.ball.vx > 0 ? 240 : -240;
      state.ball.vy = (Math.random() * 120 + 140) * (Math.random() > 0.5 ? 1 : -1);
      state.ballTrail = [];
      updateStats();
    }

    function moveAI(dt) {
      const center = state.right.y + paddleHeight / 2;
      const target = state.ball.y;
      const speedMap = { Easy: 200, Normal: 300, Hard: 400, Expert: 520 };
      const speed = speedMap[state.difficulty] || 300;
      const direction = target > center ? 1 : target < center ? -1 : 0;
      state.right.y += direction * speed * dt;
      state.right.y = Math.max(0, Math.min(canvas.height - paddleHeight, state.right.y));
    }

    function playSound(frequency, duration) {
      if (!state.soundOn) return;
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = frequency;
        osc.type = 'sine';
        gain.gain.value = 0.1;
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch (e) {}
    }

    function toggleSound() {
      state.soundOn = !state.soundOn;
      if (toggleSoundBtn) toggleSoundBtn.textContent = state.soundOn ? 'Sound On' : 'Sound Off';
      updateStats();
    }

    function cycleDifficulty() {
      const levels = ['Easy', 'Normal', 'Hard', 'Expert'];
      state.difficulty = levels[(levels.indexOf(state.difficulty) + 1) % levels.length];
      localStorage.setItem('gallery_user_level', state.difficulty);
      if (difficultyBtn) difficultyBtn.textContent = `Difficulty: ${state.difficulty}`;
      updateStats();
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen?.().catch(() => {});
      } else {
        document.exitFullscreen?.().catch(() => {});
      }
    }

    function gameLoop(timestamp) {
      if (!state.running || state.paused) return;
      
      const currentTime = timestamp || performance.now();
      const dt = state.lastFrameTime ? Math.min((currentTime - state.lastFrameTime) / 1000, 0.033) : 0.016;
      state.lastFrameTime = currentTime;

      movePaddles(dt);
      moveAI(dt);
      moveBall(dt);
      drawBoard();
      updateStats();
      
      requestAnimationFrame(gameLoop);
    }

    startBtn.addEventListener('click', () => {
      if (!state.running) {
        state.running = true;
        state.paused = false;
        state.lastFrameTime = performance.now();
        gameStateEl.textContent = 'Playing';
        requestAnimationFrame(gameLoop);
      } else if (state.paused) {
        state.paused = false;
        state.lastFrameTime = performance.now();
        gameStateEl.textContent = 'Playing';
        requestAnimationFrame(gameLoop);
      }
    });

    pauseBtn.addEventListener('click', () => {
      if (state.running && !state.paused) {
        state.paused = true;
        gameStateEl.textContent = 'Paused';
      }
    });

    resetBtn.addEventListener('click', () => {
      resetGame();
    });

    if (toggleSoundBtn) toggleSoundBtn.addEventListener('click', toggleSound);
    if (difficultyBtn) difficultyBtn.addEventListener('click', cycleDifficulty);
    if (fullscreenBtn) fullscreenBtn.addEventListener('click', toggleFullscreen);

    document.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      if (key === 'w') keys.w = true;
      if (key === 's') keys.s = true;
      if (e.key === 'ArrowUp') keys.ArrowUp = true;
      if (e.key === 'ArrowDown') keys.ArrowDown = true;
      if (key === 'm') toggleSound();
      if (key === 'd') cycleDifficulty();
      if (key === 'f') toggleFullscreen();
    });

    document.addEventListener('keyup', (e) => {
      const key = e.key.toLowerCase();
      if (key === 'w') keys.w = false;
      if (key === 's') keys.s = false;
      if (e.key === 'ArrowUp') keys.ArrowUp = false;
      if (e.key === 'ArrowDown') keys.ArrowDown = false;
    });

    if (difficultyBtn) difficultyBtn.textContent = `Difficulty: ${state.difficulty}`;
    resetGame();
  </script>
</body>
</html>
