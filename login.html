<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#58a6ff">
  <meta name="description" content="Virat Kohli Pong Game - Login">
  <title>Login - virat kohli game</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icons/icon-192.svg">
  <style>
    :root {
      color-scheme: dark;
      --bg: #07111f;
      --surface: rgba(15, 23, 42, 0.96);
      --text: #f4f7ff;
      --accent: #58a6ff;
      --accent-light: #87ceeb;
      --muted: #94a3b8;
      --border: rgba(255,255,255,0.08);
      --success: #4ade80;
      --danger: #ff6b6b;
      font-family: 'Segoe UI', Inter, system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 20% 50%, rgba(88,166,255,0.25), transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(108, 72, 255, 0.2), transparent 50%),
                  linear-gradient(135deg, #03060f 0%, #0f1729 50%, #1a1f3a 100%);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: min(480px, 100%);
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.98), rgba(30, 41, 75, 0.95));
      border: 1px solid rgba(88,166,255,0.2);
      border-radius: 28px;
      box-shadow: 0 0 60px rgba(88,166,255,0.15),
                  0 28px 88px rgba(0,0,0,0.45),
                  inset 0 1px 0 rgba(255,255,255,0.1);
      overflow: hidden;
      padding: 40px;
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0 0 32px;
      font-size: 2rem;
      background: linear-gradient(135deg, #87ceeb, #58a6ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 700;
      letter-spacing: 1px;
      text-align: center;
    }

    .profile-card {
      padding: 24px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(88,166,255,0.05), rgba(108, 72, 255, 0.03));
      border: 1.5px solid rgba(88,166,255,0.15);
      display: grid;
      gap: 16px;
      box-shadow: 0 0 30px rgba(88,166,255,0.08),
                  inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .profile-row {
      display: grid;
      gap: 8px;
    }

    .profile-row label {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--accent-light);
      letter-spacing: 0.5px;
    }

    .profile-row input {
      width: 100%;
      border: 1.5px solid rgba(88,166,255,0.15);
      border-radius: 14px;
      padding: 12px 16px;
      background: rgba(255,255,255,0.03);
      color: var(--text);
      font-size: 1rem;
      transition: all 300ms ease;
      font-weight: 500;
    }

    .profile-row input::placeholder {
      color: rgba(148, 163, 184, 0.6);
    }

    .profile-row input:focus {
      outline: none;
      border-color: rgba(88,166,255,0.5);
      background: rgba(88,166,255,0.08);
      box-shadow: 0 0 20px rgba(88,166,255,0.15);
    }

    .button {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      border: 1.5px solid rgba(88,166,255,0.2);
      background: linear-gradient(135deg, rgba(88,166,255,0.08), rgba(108, 72, 255, 0.05));
      color: var(--text);
      border-radius: 16px;
      padding: 14px 18px;
      cursor: pointer;
      transition: all 300ms cubic-bezier(0.34, 1.56, 0.64, 1);
      user-select: none;
      font-weight: 600;
      position: relative;
      overflow: hidden;
      width: 100%;
      font-size: 1rem;
    }

    .button:hover {
      background: linear-gradient(135deg, rgba(88,166,255,0.2), rgba(108, 72, 255, 0.12));
      border-color: rgba(88,166,255,0.5);
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(88,166,255,0.25);
    }

    .button:active {
      transform: translateY(-1px);
    }

    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .greeting {
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .back-link {
      text-align: center;
      margin-top: 24px;
    }

    .back-link a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 300ms ease;
    }

    .back-link a:hover {
      color: var(--accent-light);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>virat kohli game</h1>
    
    <div class="greeting" id="greeting">
      Enter your name and email to start playing!
    </div>

    <div class="profile-card">
      <div class="profile-row">
        <label>Name</label>
        <input id="userName" type="text" placeholder="Enter your name">
      </div>
      <div class="profile-row">
        <label>Email</label>
        <input id="userEmail" type="email" placeholder="Enter your email">
      </div>
      <div class="profile-row">
        <label>Password</label>
        <input id="userPassword" type="password" placeholder="Enter password">
      </div>
      <div class="profile-row">
        <label>Favorite Team</label>
        <input id="userTeam" type="text" placeholder="Your favorite team (optional)">
      </div>
      <div class="button-group">
        <button class="button" id="playBtn">Play Game</button>
        <button class="button" id="clearBtn">Clear</button>
      </div>
    </div>

    <div class="back-link">
      <a href="index.html">Back to Gallery</a>
    </div>
  </div>

  <script>
    const userName = document.getElementById('userName');
    const userEmail = document.getElementById('userEmail');
    const userPassword = document.getElementById('userPassword');
    const userTeam = document.getElementById('userTeam');
    const playBtn = document.getElementById('playBtn');
    const clearBtn = document.getElementById('clearBtn');
    const greeting = document.getElementById('greeting');

    function loadProfile() {
      const name = localStorage.getItem('gallery_user_name') || '';
      const email = localStorage.getItem('gallery_user_email') || '';
      const password = localStorage.getItem('gallery_user_password') || '';
      const team = localStorage.getItem('gallery_user_team') || '';
      if (userName) userName.value = name;
      if (userEmail) userEmail.value = email;
      if (userPassword) userPassword.value = password;
      if (userTeam) userTeam.value = team;
      updateGreeting();
    }

    function updateGreeting() {
      const name = userName.value.trim();
      const email = userEmail.value.trim();
      const password = userPassword.value;
      if (name && email && password) {
        greeting.textContent = `Welcome back, ${name}! Click "Play Game" to continue.`;
      } else {
        greeting.textContent = 'Enter your name, email, and password to start playing!';
      }
    }

    function saveProfile() {
      const name = userName.value.trim();
      const email = userEmail.value.trim();
      const password = userPassword.value;
      const team = userTeam.value.trim();

      if (!name || !email || !password) {
        greeting.textContent = 'Please enter name, email, and password.';
        greeting.style.color = '#ff6b6b';
        return;
      }

      localStorage.setItem('gallery_user_name', name);
      localStorage.setItem('gallery_user_email', email);
      localStorage.setItem('gallery_user_password', password);
      localStorage.setItem('gallery_user_team', team);
      greeting.style.color = 'var(--muted)';
      window.location.href = 'levels.html';
    }

    function clearProfile() {
      localStorage.removeItem('gallery_user_name');
      localStorage.removeItem('gallery_user_email');
      localStorage.removeItem('gallery_user_password');
      localStorage.removeItem('gallery_user_team');
      userName.value = '';
      userEmail.value = '';
      userPassword.value = '';
      userTeam.value = '';
      updateGreeting();
    }

    playBtn.addEventListener('click', saveProfile);
    clearBtn.addEventListener('click', clearProfile);
    userName.addEventListener('input', updateGreeting);
    userEmail.addEventListener('input', updateGreeting);
    userPassword.addEventListener('input', updateGreeting);

    loadProfile();
  </script>
</body>
</html>
